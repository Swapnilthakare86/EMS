version: "3.8"

services:

  backend:
    build: ./Backend         # build from local Dockerfile
    container_name: ems-backend
    restart: always
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      DB_HOST: emp-data.cpg6iaa4wcf8.ap-south-1.rds.amazonaws.com
      DB_NAME: emp_data
      DB_USER: admin
      DB_PASSWORD: Mypass1234
      TZ: Asia/Kolkata

  frontend:
    build: ./Frontend       #  build from local Dockerfile
    container_name: ems-frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend

  reports:
    build: ./reports-service     # build from local Dockerfile
    container_name: ems-reports
    restart: always
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      DB_HOST: emp-data.cpg6iaa4wcf8.ap-south-1.rds.amazonaws.com
      DB_NAME: emp_data
      DB_USER: admin
      DB_PASSWORD: Mypass1234
      TZ: Asia/Kolkata